<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการอุปกรณ์ - MMD BORROW</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("Rj2WpB-v7fZqvEu08"); 
       })();
    </script>
</head>
<body>
    <div class="ticker-wrap">
    
    <div class="ticker-heading">
        <i class="fas fa-tools"></i> SYSTEM UPDATE
    </div>
    
    <div class="ticker-move">
        <div class="ticker-item">
            ขณะนี้กำลังพัฒนาระบบเพื่อความสะดวกในการจัดยืมของในสาขา MMD (RMUTI Surin) &nbsp;&nbsp; • &nbsp;&nbsp; หากพบปัญหาโปรดแจ้งแอดมินทันที
        </div>
    </div>
</div>
    <div class="bg-animate"></div>
    
<nav>
    <div class="logo"><i class="fas fa-video"></i> MMD BORROW</div>
    
    <div class="user-info">
        <span id="userNameDisplay">Loading...</span> 

        <button onclick="window.openHistoryModal()" class="btn-history">
            <i class="fas fa-history"></i> ประวัติการจอง
        </button>

        <a href="about.html" class="btn-history" style="border-color: #fff; color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;">
            <i class="fas fa-user-astronaut"></i> ผู้พัฒนา
        </a>

        <button onclick="window.logout()" class="btn-logout" title="ออกจากระบบ">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</nav>

    <div class="container">
        <div class="filters">
            <button onclick="window.filterItems('all')" class="active">ทั้งหมด</button>
            <button onclick="window.filterItems('camera')">กล้อง</button>
            <button onclick="window.filterItems('tripod')">ขาตั้ง/Gimbal</button>
            <button onclick="window.filterItems('audio')">เสียง</button>
            <button onclick="window.filterItems('light')">ไฟสตูดิโอ</button>
            <div class="search-box">
                <i class="fas fa-search" style="color: #666;"></i>
                <input type="text" placeholder="ค้นหาอุปกรณ์..." onkeyup="window.searchItem(this.value)">
            </div>
        </div>
        <div id="itemGrid" class="item-grid"></div>
    </div>

    <div id="borrowModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="window.closeModal()">&times;</span>
            <h3 style="color:var(--theme-primary); margin-top:0;"><i class="far fa-edit"></i> แบบฟอร์มยืมอุปกรณ์</h3>
            <p>กำลังยืม: <strong id="modalItemName" style="color: #fff;">...</strong></p>
            
            <form id="borrowForm">
                <label style="color:#888; font-size:12px;">ชื่อผู้ยืม</label>
                <input type="text" id="borrowerName" readonly style="color:#666; cursor:not-allowed;">
                
                <label style="color:#888; font-size:12px;">วันที่คืน</label>
                <input type="text" id="borrowDate" placeholder="คลิกเพื่อเลือกวันที่..." required style="cursor: pointer; background-color: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box;">

                <label style="color:#888; font-size:12px;">เหตุผลการยืม</label>
                <textarea rows="3" placeholder="เช่น ใช้ถ่ายงานวิชา..."></textarea>
                
                <div class="modal-actions" style="display:flex; gap:10px; margin-top:15px;">
                    <button type="button" onclick="window.closeModal()" class="btn-cancel">ยกเลิก</button>
                    <button type="submit" class="btn-confirm">ยืนยันการจอง</button>
                </div>
            </form>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content" style="width: 800px;">
            <span class="close" onclick="window.closeHistoryModal()">&times;</span>
            <h3 style="color:var(--theme-primary); margin-top:0;"><i class="fas fa-history"></i> ประวัติการจองของฉัน</h3>
            
            <div class="table-responsive">
                <table class="data-table" style="width:100%; color:white; font-size:14px;">
                    <thead>
                        <tr>
                            <th style="border-bottom:1px solid var(--theme-primary);">อุปกรณ์</th>
                            <th style="border-bottom:1px solid var(--theme-primary);">วันที่</th>
                            <th style="border-bottom:1px solid var(--theme-primary);">สถานะ</th>
                            <th style="border-bottom:1px solid var(--theme-primary);">ดำเนินการ</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
            
            <input type="file" id="pickupProofInput" accept="image/*" style="display:none;">

            <div style="margin-top:20px; text-align:right;">
                <button onclick="window.closeHistoryModal()" class="btn-cancel">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic"></audio> 
    <div id="musicControl" onclick="toggleMusic()" style="
        position: fixed; bottom: 20px; left: 20px; z-index: 9999;
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.2); color: white; 
        padding: 10px 15px; border-radius: 30px; cursor: pointer; 
        font-family: 'Poppins', sans-serif; font-size: 14px;
        display: flex; align-items: center; gap: 8px;
        transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    ">
        <div id="musicIcon">🔇</div>
        <span id="musicText">Click to Play</span>
    </div>

    <script>
        const playlist = [
            "https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3", 
            "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3?filename=spirit-blossom-15285.mp3",
            "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=lofi-chill-medium-version-159456.mp3"
        ];
        let currentTrack = 0;
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicControl');
        const icon = document.getElementById('musicIcon');
        const text = document.getElementById('musicText');
        music.volume = 0.3; 
        function loadTrack(index) { music.src = playlist[index]; music.load(); }
        function nextTrack() { currentTrack++; if (currentTrack >= playlist.length) currentTrack = 0; loadTrack(currentTrack); music.play(); updateButtonState(true); }
        music.addEventListener('ended', nextTrack);
        function updateButtonState(isPlaying) { if (isPlaying) { btn.style.background = "var(--theme-primary)"; btn.style.color = "black"; icon.innerText = "🎵"; icon.style.animation = "spin 2s linear infinite"; text.innerText = `Track ${currentTrack + 1}`; } else { btn.style.background = "rgba(0, 0, 0, 0.6)"; btn.style.color = "white"; icon.innerText = "🔇"; icon.style.animation = "none"; text.innerText = "Music Paused"; } }
        function toggleMusic() { if (music.paused) { music.play(); updateButtonState(true); } else { music.pause(); updateButtonState(false); } }
        loadTrack(currentTrack);
        window.addEventListener('load', () => { const playPromise = music.play(); if (playPromise !== undefined) { playPromise.then(_ => { updateButtonState(true); }).catch(error => { console.log("Autoplay blocked."); document.body.addEventListener('click', () => { music.play(); updateButtonState(true); }, { once: true }); }); } });
        const styleSheet = document.createElement("style"); styleSheet.innerText = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } #musicControl:hover { transform: scale(1.05); }`; document.head.appendChild(styleSheet);
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
