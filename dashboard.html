<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการอุปกรณ์ - MMD BORROW</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("Rj2WpB-v7fZqvEu08"); })();
    </script>
</head>
<body>
    <div class="ticker-wrap">
        <div class="ticker-heading"><i class="fas fa-tools"></i> SYSTEM UPDATE</div>
        <div class="ticker-move">
            <div class="ticker-item">ขณะนี้กำลังพัฒนาระบบเพื่อความสะดวกในการจัดยืมของในสาขา MMD (RMUTI Surin) &nbsp;&nbsp; • &nbsp;&nbsp; หากพบปัญหาโปรดแจ้งแอดมินทันที</div>
        </div>
    </div>
    <div class="bg-animate"></div>
    
    <nav>
        <div class="logo"><i class="fas fa-video"></i> MMD BORROW</div>
        <div class="user-info">
            <span id="userNameDisplay">Loading...</span> 
            <button id="btnAdminManage" onclick="window.location.href='admin.html'" class="btn-history" style="display: none; background: #ff9800; border-color: #ff9800; color: #fff;"><i class="fas fa-user-shield"></i> ระบบหลังบ้าน</button>
            <button onclick="window.openCartModal()" class="btn-history" style="background: #28a745; border-color: #28a745; color: #fff;"><i class="fas fa-shopping-cart"></i> ตะกร้า <span id="cartCountBadge" style="background: #dc3545; color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; margin-left: 5px;">0</span></button>
            <button onclick="window.openHistoryModal()" class="btn-history"><i class="fas fa-history"></i> ประวัติการจอง</button>
            <button onclick="window.logout()" class="btn-logout" title="ออกจากระบบ"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="container">
        <div class="filters">
            <button onclick="window.filterItems('all')" class="active">ทั้งหมด</button>
            <button onclick="window.filterItems('camera')">กล้อง</button>
            <button onclick="window.filterItems('tripod')">ขาตั้ง/Gimbal</button>
            <button onclick="window.filterItems('audio')">เสียง</button>
            <button onclick="window.filterItems('light')">ไฟสตูดิโอ</button>
            <div class="search-box">
                <i class="fas fa-search" style="color: #666;"></i>
                <input type="text" placeholder="ค้นหาอุปกรณ์..." onkeyup="window.searchItem(this.value)">
            </div>
        </div>
        <div id="itemGrid" class="item-grid"></div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content" style="width: 500px;">
            <span class="close" onclick="window.closeCartModal()">&times;</span>
            <h3 style="color:#28a745; margin-top:0;"><i class="fas fa-shopping-cart"></i> ตะกร้าอุปกรณ์ที่เลือก</h3>
            <div id="cartItemsList" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 15px; max-height: 200px; overflow-y: auto;"></div>
            
            <form id="cartForm">
                <label style="color:#888; font-size:12px;">ชื่อผู้ยืม</label>
                <input type="text" id="cartBorrowerName" readonly style="color:#666; cursor:not-allowed;">
                
                <div style="display:flex; gap:10px; margin: 10px 0;">
                    <div style="flex:1;">
                        <label style="color:#888; font-size:12px;">📅 วันที่รับของ</label>
                        <input type="date" id="cartBorrowDate" required style="margin: 5px 0 0; width: 100%; box-sizing: border-box;">
                    </div>
                    <div style="flex:1;">
                        <label style="color:#888; font-size:12px;">📅 วันและเวลาที่คืน</label>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <input type="date" id="cartReturnDate" required style="width: 60%; box-sizing: border-box; margin:0;">
                            <input type="time" id="cartReturnTime" required style="width: 40%; box-sizing: border-box; margin:0;">
                        </div>
                    </div>
                </div>

                <label style="color:#888; font-size:12px;">เหตุผลการยืม</label>
                <textarea id="cartReason" rows="3" placeholder="ระบุเหตุผลการยืมและสถานที่ถ่ายทำ..."></textarea>
                
                <div style="margin-top: 15px; background: rgba(255, 102, 0, 0.1); padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255, 102, 0, 0.5);">
                    <label style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer; margin: 0;">
                        <input type="checkbox" id="cartTerms" required style="width: 20px !important; height: 20px !important; margin: 2px 0 0 0 !important; padding: 0 !important; flex-shrink: 0; appearance: auto !important; accent-color: #ff6600; cursor: pointer; outline: none; border: none;">
                        <span style="color: #eee; font-size: 13px; line-height: 1.6; flex: 1;">
                            ข้าพเจ้ายอมรับ <b style="color: #ff9800;">ข้อตกลงและเงื่อนไข</b> ว่าจะดูแลรักษาอุปกรณ์เป็นอย่างดี หากเกิดความเสียหาย ชำรุด หรือสูญหาย ข้าพเจ้ายินดีรับผิดชอบและชดใช้ตามมูลค่าจริงทุกประการ
                        </span>
                    </label>
                </div>
                
                <div class="modal-actions" style="display:flex; gap:10px; margin-top:15px;">
                    <button type="button" onclick="window.closeCartModal()" class="btn-cancel">ยกเลิก</button>
                    <button type="submit" class="btn-confirm" style="background: #28a745; border-color: #28a745; width: 100%;"><i class="fas fa-check-circle"></i> ยืนยันการจองทั้งหมด</button>
                </div>
            </form>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content" style="width: 800px;">
            <span class="close" onclick="window.closeHistoryModal()">&times;</span>
            <h3 style="color:var(--theme-primary); margin-top:0;"><i class="fas fa-history"></i> ประวัติการจองของฉัน</h3>
            <div class="table-responsive">
                <table class="data-table" style="width:100%; color:white; font-size:14px;">
                    <thead>
                        <tr>
                            <th style="border-bottom:1px solid var(--theme-primary);">อุปกรณ์</th>
                            <th style="border-bottom:1px solid var(--theme-primary);">วันที่</th>
                            <th style="border-bottom:1px solid var(--theme-primary);">สถานะ</th>
                            <th style="border-bottom:1px solid var(--theme-primary);">ดำเนินการ</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
            <input type="file" id="pickupProofInput" accept="image/*" style="display:none;">
            <div style="margin-top:20px; text-align:right;">
                <button onclick="window.closeHistoryModal()" class="btn-cancel">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div id="itemDetailModal" class="modal">
        <div class="modal-content" style="max-width: 500px; padding: 0; overflow: hidden; border-radius: 15px;">
            <span class="close" onclick="window.closeItemDetail()" style="position: absolute; right: 15px; top: 10px; z-index: 10; background: rgba(0,0,0,0.6); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: white;">&times;</span>
            <div id="itemDetailBody"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
