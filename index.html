<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMD BORROW - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript">
       (function(){
          // Initial Key ไว้กันเหนียว เผื่อ script.js โหลดไม่ทัน
          try { emailjs.init("Rj2WpB-v7fZqvEu08"); } catch(e) {}
       })();
    </script>
</head>
<body>
    <div class="bg-animate"></div>

    <div class="login-wrapper">
        <div class="glass-card">
            <div class="logo-area">
                <div class="icon-circle"><i class="fas fa-layer-group"></i></div>
                <h2>MMD <span style="color:var(--theme-primary)">BORROW</span></h2>
                <p>ระบบยืม-คืนครุภัณฑ์ สาขามัลติมีเดีย</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" required>
                    <label>รหัสนักศึกษา / ชื่อผู้ใช้</label>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" required>
                    <label>รหัสผ่าน</label>
                </div>
                <button type="submit" class="btn-glow">เข้าสู่ระบบ</button>
                <div class="footer-links">
                    <a href="#">ลืมรหัสผ่าน?</a>
                    <span style="color:#888">ยังไม่มีบัญชี? <a class="register-link" onclick="toggleForm()">สมัครสมาชิก</a></span>
                </div>
            </form>

            <form id="registerForm" class="hidden">
                <div class="input-group">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="regName" required>
                    <label>ชื่อ-นามสกุล</label>
                </div>
                <div class="input-group">
                    <i class="fas fa-user-plus"></i>
                    <input type="text" id="regUser" required>
                    <label>ตั้งชื่อผู้ใช้ (Username)</label>
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="regPass" required>
                    <label>ตั้งรหัสผ่าน (Password)</label>
                </div>
                <button type="submit" class="btn-glow" style="filter: hue-rotate(45deg);">ยืนยันการสมัคร</button>
                <div class="footer-links" style="justify-content: center;">
                    <a class="register-link" onclick="toggleForm()"><i class="fas fa-arrow-left"></i> กลับไปหน้าเข้าสู่ระบบ</a>
                </div>
            </form>
        </div>
    </div>

    <div id="adminModal" class="modal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8);">
        <div class="modal-content" style="background: rgba(20, 20, 20, 0.95); margin: 10% auto; padding: 25px; border: 1px solid #ff9800; border-radius: 10px; width: 800px; max-width: 90%; color: white; box-shadow: 0 0 20px rgba(255, 152, 0, 0.3);">
            <span class="close" onclick="window.closeAdminModal()" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            <h3 style="color:#ff9800; margin-top:0; font-family: 'Kanit', sans-serif;"><i class="fas fa-users-cog"></i> จัดการสิทธิ์ผู้ใช้งาน (Admin Only)</h3>
            
            <div class="table-responsive" style="margin-top: 20px; max-height: 400px; overflow-y: auto;">
                <table class="data-table" style="width:100%; color:white; font-size:14px; text-align:left; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="border-bottom:1px solid #ff9800; padding:12px; font-family: 'Kanit', sans-serif;">ชื่อผู้ใช้งาน</th>
                            <th style="border-bottom:1px solid #ff9800; padding:12px; font-family: 'Kanit', sans-serif;">อีเมล / รหัส</th>
                            <th style="border-bottom:1px solid #ff9800; padding:12px; font-family: 'Kanit', sans-serif;">สิทธิ์ปัจจุบัน</th>
                            <th style="border-bottom:1px solid #ff9800; padding:12px; font-family: 'Kanit', sans-serif;">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="adminUserTableBody">
                        </tbody>
                </table>
            </div>
            
            <div style="margin-top:25px; text-align:right;">
                <button onclick="window.closeAdminModal()" class="btn-cancel" style="background: #444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: 'Kanit', sans-serif; transition: 0.3s;">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
